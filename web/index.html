<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Keeper</title>
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface-2: #1d2029;
    --border: #262a35;
    --text: #e6e8ec;
    --muted: #8b8f9a;
    --accent: #6c8cff;
    --accent-hover: #7f9bff;
    --danger: #ff5c5c;
    --tag-bg: #232838;
    --tag-text: #a9b6e6;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 48px 20px;
  }

  .container { max-width: 640px; margin: 0 auto; }

  header { margin-bottom: 36px; }
  h1 {
    font-size: 26px;
    font-weight: 650;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 .dot { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 14px; margin-top: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  input::placeholder { color: #565b68; }

  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-add {
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    width: 100%;
    margin-top: 4px;
  }
  .btn-add:hover { background: var(--accent-hover); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 13px; color: var(--muted); }
  .chip {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active {
    background: var(--accent);
    color: #fff;
  }

  .list { display: flex; flex-direction: column; gap: 12px; }
  .bookmark {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: none; }
  }
  .bm-main { min-width: 0; flex: 1; }
  .bm-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bm-url {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bm-url:hover { text-decoration: underline; }
  .bm-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .bm-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .bm-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .btn-del {
    background: transparent;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .btn-del:hover { background: var(--surface-2); color: var(--danger); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }

  .tg-logo {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    background: #fff;
    display: block;
  }
  .tg-logo:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 22px rgba(108,140,255,0.45);
  }
  .tg-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bookmark Keeper <span class="dot">•</span></h1>
      <div class="subtitle">Личный каталог ссылок</div>
    </header>

    <div class="card">
      <div class="field">
        <label for="url">URL</label>
        <input type="text" id="url" placeholder="https://example.com">
      </div>
      <div class="field">
        <label for="title">Название</label>
        <input type="text" id="title" placeholder="Моя закладка">
      </div>
      <div class="field">
        <label for="tags">Теги (через запятую)</label>
        <input type="text" id="tags" placeholder="go, docs, learning">
      </div>
      <button class="btn-add" id="addBtn">Добавить закладку</button>
      <div class="error" id="error"></div>
    </div>

    <div class="filter-bar" id="filterBar"></div>

    <div class="list" id="list"></div>
  </div>

  <a href="https://t.me/vah228" target="_blank" rel="noopener" class="tg-logo" title="Написать в Telegram">
    <img src="/logo.png" alt="FunnyEz">
  </a>

<script>
  const API = "/bookmarks";
  let bookmarks = [];
  let activeTag = null;

  const $ = (id) => document.getElementById(id);

  async function load() {
    try {
      const res = await fetch(API);
      bookmarks = await res.json();
      render();
    } catch (e) {
      showError("Не удалось загрузить закладки");
    }
  }

  async function add() {
    const url = $("url").value.trim();
    const title = $("title").value.trim();
    const tagsRaw = $("tags").value.trim();
    const tags = tagsRaw
      ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean)
      : [];

    showError("");
    const btn = $("addBtn");
    btn.disabled = true;

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, title, tags }),
      });
      if (res.status === 400) {
        showError("Проверьте поля: URL должен начинаться с http:// или https://, название не пустое и до 100 символов.");
        return;
      }
      if (!res.ok) {
        showError("Ошибка сервера: " + res.status);
        return;
      }
      $("url").value = "";
      $("title").value = "";
      $("tags").value = "";
      await load();
    } catch (e) {
      showError("Нет связи с сервером");
    } finally {
      btn.disabled = false;
    }
  }

  async function del(id) {
    try {
      await fetch(API + "/" + id, { method: "DELETE" });
      await load();
    } catch (e) {
      showError("Не удалось удалить");
    }
  }

  function showError(msg) {
    $("error").textContent = msg;
  }

  function allTags() {
    const set = new Set();
    bookmarks.forEach(b => (b.tags || []).forEach(t => set.add(t)));
    return [...set].sort();
  }

  function render() {
    renderFilter();
    renderList();
  }

  function renderFilter() {
    const bar = $("filterBar");
    const tags = allTags();
    if (tags.length === 0) { bar.innerHTML = ""; return; }

    let html = '<span class="filter-label">Фильтр:</span>';
    html += `<span class="chip ${activeTag === null ? "active" : ""}" data-tag="">все</span>`;
    tags.forEach(t => {
      html += `<span class="chip ${activeTag === t ? "active" : ""}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`;
    });
    bar.innerHTML = html;

    bar.querySelectorAll(".chip").forEach(chip => {
      chip.onclick = () => {
        const t = chip.getAttribute("data-tag");
        activeTag = t === "" ? null : t;
        render();
      };
    });
  }

  function renderList() {
    const list = $("list");
    let items = bookmarks;
    if (activeTag !== null) {
      items = bookmarks.filter(b => (b.tags || []).includes(activeTag));
    }

    if (items.length === 0) {
      list.innerHTML = '<div class="empty">Пока нет закладок</div>';
      return;
    }

    list.innerHTML = items.map(b => `
      <div class="bookmark">
        <div class="bm-main">
          <div class="bm-title">${escapeHtml(b.title)}</div>
          <a class="bm-url" href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${escapeHtml(b.url)}</a>
          ${(b.tags && b.tags.length)
            ? `<div class="bm-tags">${b.tags.map(t => `<span class="bm-tag">${escapeHtml(t)}</span>`).join("")}</div>`
            : ""}
          <div class="bm-meta">${formatDate(b.created_at)}</div>
        </div>
        <button class="btn-del" data-id="${b.id}" title="Удалить">✕</button>
      </div>
    `).join("");

    list.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => del(btn.getAttribute("data-id"));
    });
  }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return "";
    return d.toLocaleString("ru-RU", {
      day: "2-digit", month: "short",
      hour: "2-digit", minute: "2-digit",
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  $("addBtn").onclick = add;
  [ "url", "title", "tags" ].forEach(id => {
    $(id).addEventListener("keydown", e => {
      if (e.key === "Enter") add();
    });
  });

  load();
</script>
</body>
</html>
